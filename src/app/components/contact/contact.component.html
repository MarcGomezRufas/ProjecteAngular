<div class="row align-items-center justify-content-center" style="min-height: 50vh;">
  <div class="col-lg-6 col-md-8">
    <div class="card-premium p-5 shadow-sm">
      <div class="text-center mb-5">
        <h2 class="display-6 fw-bold text-dark">Contacta'ns</h2>
        <p class="text-muted">Si tens dubtes o propostes, omple el següent formulari.</p>
      </div>

      <form>
        <div class="mb-4">
          <label for="name" class="form-label fw-bold small text-uppercase text-muted">El teu nom</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-end-0"><i class="bi bi-person"></i></span>
            <input type="text" class="form-control form-control-custom border-start-0 ps-0" id="name" placeholder="Escriu aquí" required>
          </div>
        </div>

        <div class="mb-4">
          <label for="email" class="form-label fw-bold small text-uppercase text-muted">Correu Electrònic</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope"></i></span>
            <input type="email" class="form-control form-control-custom border-start-0 ps-0" id="email" placeholder="nom@exemple.cat" required>
          </div>
        </div>

        <div class="mb-4">
          <label for="message" class="form-label fw-bold small text-uppercase text-muted">El teu missatge</label>
          <textarea class="form-control form-control-custom" id="message" rows="4" placeholder="Com et podem ajudar?"></textarea>
        </div>

        <div class="d-grid mt-5">
          <button type="button" class="btn btn-primary-custom btn-lg w-100" onclick="alert('Funcionalitat en desenvolupament!')">
            Envia missatge <i class="bi bi-send ms-2"></i>
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
