<div class="row pt-4 mb-5" *ngIf="project">
  <div class="col-md-7 mb-4 mb-md-0">
    <div class="card-premium h-100 overflow-hidden d-flex align-items-center justify-content-center" style="background-color: #f1f2f6; min-height: 400px;">
      <img *ngIf="project.image && project.image !== 'null'" src="{{ url + 'get-image/' + project.image }}" class="img-fluid w-100 h-100" style="object-fit: contain;" alt="{{ project.name }}">
      <div *ngIf="!project.image || project.image === 'null'" class="text-muted d-flex flex-column align-items-center">
        <i class="bi bi-image" style="font-size: 5rem;"></i>
        <p class="mt-2">Sense imatge</p>
      </div>
    </div>
  </div>

  <div class="col-md-5 d-flex flex-column justify-content-center">
    <div>
      <h2 class="display-5 fw-bold text-dark">{{ project.name }}</h2>
      <p class="lead text-muted fst-italic mb-4">{{ project.description }}</p>
      
      <div class="mb-4">
        <div class="d-flex align-items-center mb-2">
          <i class="bi bi-tag-fill text-primary me-2"></i>
          <strong>Categoria:</strong> <span class="ms-2">{{ project.category }}</span>
        </div>
        <div class="d-flex align-items-center mb-2">
          <i class="bi bi-calendar-check text-primary me-2"></i>
          <strong>Any:</strong> <span class="ms-2">{{ project.year }}</span>
        </div>
        <div class="d-flex align-items-center mb-2">
          <i class="bi bi-code-slash text-primary me-2"></i>
          <strong>Llenguatges:</strong> <span class="ms-2 badge bg-dark text-white rounded-pill px-3">{{ project.langs }}</span>
        </div>
      </div>

      <hr class="my-4">

      <div class="d-flex gap-3 mt-4">
        <a [routerLink]="['/edit', project._id]" class="btn btn-warning text-dark fw-bold px-4 py-2" style="border-radius: 8px;">
          <i class="bi bi-pencil-square me-2"></i> Editar
        </a>
        <button (click)="deleteProject(project._id)" class="btn btn-danger-custom px-4 py-2">
          <i class="bi bi-trash ms-2"></i> Eliminar
        </button>
      </div>
      <div class="mt-4">
        <a routerLink="/projects" class="text-decoration-none text-secondary"><i class="bi bi-arrow-left"></i> Tornar als projectes</a>
      </div>
    </div>
  </div>
</div>

<div class="row align-items-center text-center mt-5" *ngIf="!project" style="min-height: 50vh;">
  <div class="col">
    <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
    <h4 class="text-muted mt-3">Carregant projecte...</h4>
  </div>
</div>
